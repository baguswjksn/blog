<div style="position: fixed; bottom: 1rem; right: 1rem; z-index: 50;">
  <select id="themeLangSelect"
    style="padding: 0.5rem; border: 1px solid #ccc; border-radius: 0.25rem; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); font-size: 0.875rem; background-color: white; color: #1a202c;">
    <option value="dark-en">Dark EN</option>
    <option value="light-en">Light EN</option>
    <option value="dark-id">Dark ID</option>
    <option value="light-id">Light ID</option>
  </select>
</div>

 <script>
    // Language & Theme toggler
    document.getElementById("themeLangSelect").addEventListener("change", function () {
      const value = this.value;
      const [theme, lang] = value.split("-");

      // Set theme class on <body>
      if (theme === "dark") {
        document.body.classList.add("bg-gray-900", "text-white");
        document.body.classList.remove("bg-white", "text-black");
      } else {
        document.body.classList.add("bg-white", "text-black");
        document.body.classList.remove("bg-gray-900", "text-white");
      }

      // Toggle language content
      document.querySelectorAll('[data-lang]').forEach(div => {
        div.classList.toggle('hidden', div.getAttribute('data-lang') !== lang);
      });
    });

    // Optional: set initial mode
    document.getElementById("themeLangSelect").dispatchEvent(new Event("change"));
  </script>
